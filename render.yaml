services:
  - type: web
    name: anicove
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:client
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: sessions
      mountPath: /var/data/sessions
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 10000
      - key: NO_PROMPT
        value: true
      - key: RENDER
        value: true
      - key: NODE_ENV
        value: production
      - key: SESSION_PATH
        value: /var/data/sessions
      - key: SESSION_SECRET
        generateValue: true
      - key: ANILIST_CLIENT_ID
        sync: false
      - key: ANILIST_CLIENT_SECRET
        sync: false
      - key: ANILIST_REDIRECT_URI
        sync: false
      - key: STREAM_WHITELIST_SECRET
        generateValue: true
      - key: MIRURO_PIPE_URL
        value: https://www.miruro.tv/api/secure/pipe
      - key: CF_CLEARANCE_MIRURO
        value: ""
      - key: CF_USER_AGENT
        value: ""
